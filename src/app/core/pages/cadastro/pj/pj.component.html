<div class="registration-page">
    <header class="login-header">
        <div class="header-container">
            <div class="logo">
                <div class="logo-box">⚡</div>
                <div class="logo-text">
                    <span>Eletrotécnica</span>
                    <span>Maurício</span>
                </div>
            </div>
            <div class="header-info">
                <span>Atendimento</span>
                <span>Televendas (11) 3508-9979</span>
            </div>
        </div>
    </header>

    <main class="login-main">
        <div class="registration-card">
            <div class="user-avatar-orange">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect>
                    <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path>
                </svg>
            </div>

            <h1>Criar conta empresa</h1>

            <form class="registration-form">
                <div class="form-row">
                    <div class="form-group floating-label">
                        <input type="text" id="razao" placeholder=" " class="form-input">
                        <label for="razao">Razão Social *</label>
                    </div>
                    <div class="form-group floating-label">
                        <input type="text" id="cnpj" placeholder=" " class="form-input">
                        <label for="cnpj">CNPJ *</label>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group floating-label">
                        <input type="text" id="responsavel" placeholder=" " class="form-input">
                        <label for="responsavel">Nome do Responsável *</label>
                    </div>
                    <div class="form-group floating-label">
                        <input type="text" id="celular" placeholder=" " class="form-input">
                        <label for="celular">Telefone / WhatsApp *</label>
                    </div>
                </div>

                <div class="form-group floating-label full-width">
                    <input type="email" id="email" placeholder=" " class="form-input">
                    <label for="email">E-mail Corporativo *</label>
                </div>

                <div class="form-row">
                    <div class="form-group floating-label password-wrapper">
                        <input type="password" id="senha" placeholder=" " class="form-input">
                        <label for="senha">Digite sua senha *</label>
                        <span class="password-toggle">👁️</span>
                    </div>
                    <div class="form-group floating-label password-wrapper">
                        <input type="password" id="confirmar" placeholder=" " class="form-input">
                        <label for="confirmar">Confirme sua senha *</label>
                        <span class="password-toggle">👁️</span>
                    </div>
                </div>

                <div class="password-hint">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                        <path
                            d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z" />
                    </svg>
                    <span>Sua senha deve ter entre 8 a 20 caracteres. Use uma senha forte para proteger os dados da sua
                        empresa.</span>
                </div>

                <div class="terms-group">
                    <label class="checkbox-container">
                        <input type="checkbox">
                        <span class="checkmark"></span>
                        <span class="terms-text">Li, entendi e estou de acordo com os <a href="#">Termos e condições</a>
                            e autorizo o uso de meus dados de acordo com a <a href="#">Política de
                                Privacidade</a>.</span>
                    </label>
                </div>

                <button type="submit" class="btn-submit-green">Criar Conta</button>
            </form>

            <footer class="card-footer">
                <div class="security">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                        <path
                            d="M12 2L4 5v6.09c0 5.05 3.41 9.76 8 10.91 4.59-1.15 8-5.86 8-10.91V5l-8-3zm0 10V6l5 1.88v4.21c0 3.84-2.14 7.4-5 8.35-2.86-.94-5-4.51-5-8.35V7.88L12 6v6z" />
                    </svg>
                    <div class="security-text">
                        <strong>AMBIENTE 100%</strong>
                        <span>SEGURO</span>
                    </div>
                </div>
                <p class="copyright">Copyright © 2000-2025 Eletrotécnica Maurício. Todos os direitos reservados.</p>
            </footer>
        </div>
    </main>
</div>
