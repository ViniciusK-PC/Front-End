<div class="private-container">


    <nav class="painel-tabs">
        <button [class.active]="abaAtiva() === 'dashboard'" (click)="setAba('dashboard')">
            📊 Dashboard
        </button>
        <button [class.active]="abaAtiva() === 'usuarios'" (click)="setAba('usuarios')">
            👥 Usuários
        </button>
        <button [class.active]="abaAtiva() === 'ordens'" (click)="setAba('ordens')">
            🔧 Ordens
        </button>
        <button [class.active]="abaAtiva() === 'sistema'" (click)="setAba('sistema')">
            ⚙️ Sistema
        </button>
    </nav>

    <main class="painel-content">
        @if (abaAtiva() === 'dashboard') {
        <app-dashboard></app-dashboard>
        }

        @if (abaAtiva() === 'usuarios') {
        <app-usuarios-list></app-usuarios-list>
        }

        @if (abaAtiva() === 'ordens') {
        <app-ordens-board></app-ordens-board>
        }

        @if (abaAtiva() === 'sistema') {
        <div class="system-status-card">
            <h2>Status do Módulo Isolado</h2>
            <div class="status-info">
                <p><strong>Status:</strong> {{ statusPainel() }}</p>
                <p><strong>Mensagem:</strong> {{ mensagemPainel() }}</p>
            </div>
        </div>
        }
    </main>
</div>
